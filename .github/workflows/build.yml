name: "Tauri Build — Çapraz Platform"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Rust kur
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust önbelleği
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Linux bağımlılıkları
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: npm bağımlılıklarını yükle
        run: npm install

      - name: dist klasörünü hazırla (Linux/Mac)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r css dist/
          cp -r js dist/

      - name: dist klasörünü hazırla (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          if (-not (Test-Path dist)) { New-Item -ItemType Directory -Path dist }
          Copy-Item index.html dist/
          Copy-Item -Recurse css dist/
          Copy-Item -Recurse js dist/

      - name: Tauri derle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sınıf Asistanı v__VERSION__"
          releaseBody: |
            Bu sürümdeki değişiklikler için CHANGELOG.md dosyasına bakın.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Paketleri yükle
        uses: actions/upload-artifact@v4
        with:
          name: sinif-asistani-${{ matrix.platform }}-${{ matrix.args != '' && matrix.args || 'default' }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: ignore
permissions:
  contents: write
