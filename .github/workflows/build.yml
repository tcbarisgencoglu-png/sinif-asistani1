name: "Tauri Build — Çapraz Platform"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            artifact_name: "mac-apple-silicon"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            artifact_name: "mac-intel"
          - platform: "ubuntu-22.04"
            args: ""
            artifact_name: "linux"
          - platform: "windows-latest"
            args: "--bundles nsis"
            artifact_name: "windows"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Rust kur
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust önbelleği
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Linux bağımlılıkları
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: npm bağımlılıklarını yükle
        run: npm install

      - name: dist klasörünü hazırla (Linux/Mac)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r css dist/
          cp -r js dist/

      - name: dist klasörünü hazırla (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Path dist
          Copy-Item index.html dist/
          Copy-Item -Recurse css dist/
          Copy-Item -Recurse js dist/

      - name: Tauri derle (Normal Push)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Tauri derle ve Release oluştur (Etiket Push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sınıf Asistanı ${{ github.ref_name }}"
          releaseBody: |
            ## 🎉 Sınıf Asistanı ${{ github.ref_name }} Yayınlandı!

            Değişiklikler için [CHANGELOG.md](https://github.com/tcbarisgencoglu-png/sinif-asistani1/blob/main/CHANGELOG.md) dosyasına bakın.

            ---

            ## 📥 Hangi Dosyayı İndirmeliyim?

            Aşağıdaki tablodan işletim sisteminize uygun satırı bulun ve **tam dosya adını** Assets listesinde arayın:

            | İşletim Sistemi | İndirilecek Dosya |
            |---|---|
            | 🍎 **macOS — Apple Silicon** (M1, M2, M3, M4) | `Sinif.Asistani_X.X.X_aarch64.dmg` |
            | 🍎 **macOS — Intel** (2019 ve öncesi Mac'ler) | `Sinif.Asistani_X.X.X_x64.dmg` |
            | 🪟 **Windows 10 / 11** | `Sinif.Asistani_X.X.X_x64-setup.exe` |
            | 🐧 **Linux — Ubuntu / Debian** | `Sinif.Asistani_X.X.X_amd64.deb` |
            | 🐧 **Linux — Fedora / CentOS / RHEL** | `Sinif.Asistani_X.X.X-1.x86_64.rpm` |
            | 🐧 **Linux — Diğer Dağıtımlar** | `Sinif.Asistani_X.X.X_amd64.AppImage` |

            > **Not:** Tablodaki `X.X.X` yerine bu sürümün numarasını yazın (örn. `1.0.1`).

            ### 💡 Mac'imde hangi işlemci var?
            Sol üst köşe → Apple menüsü (🍎) → **Bu Mac Hakkında** → İşlemci/Çip satırına bakın.
            - **Apple M1 / M2 / M3 / M4** → `aarch64.dmg`
            - **Intel Core i5 / i7 / i9** → `x64.dmg`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Paketleri yükle (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: sinif-asistani-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/*/release/bundle/**/*.dmg
            src-tauri/target/*/release/bundle/**/*.app
            src-tauri/target/*/release/bundle/**/*.msi
            src-tauri/target/*/release/bundle/**/*.exe
            src-tauri/target/*/release/bundle/**/*.AppImage
            src-tauri/target/*/release/bundle/**/*.deb
          if-no-files-found: ignore
